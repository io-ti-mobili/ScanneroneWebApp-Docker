<div class="nav-container">
    <a routerLink="/dashboard" class="brand">
        Scannerone
    </a>
    
    <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
        ☰
    </button>
    
    <div class="nav-menu" [class.mobile-open]="isMobileMenuOpen">
        <div class="nav-links">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-button" (click)="isMobileMenuOpen = false">{{ 'NAVBAR.DASHBOARD' | translate }}</a>
            <a routerLink="/classifica" routerLinkActive="active" class="nav-button" (click)="isMobileMenuOpen = false">{{ 'NAVBAR.LEADERBOARD' | translate }}</a>
        </div>

        <div class="lang-switch">
            <button (click)="switchLang('it')" [class.active]="currentLang === 'it'">IT</button>
            <span class="sep">|</span>
            <button (click)="switchLang('en')" [class.active]="currentLang === 'en'">EN</button>
        </div>
    </div>
</div>
